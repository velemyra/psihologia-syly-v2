<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Психологія Сили PRO</title>

  <link rel="icon" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=3.0.0">

  <meta name="theme-color" content="#000000" />
</head>
<body>
  <div id="status" class="status"></div>
  
  <div id="app">
    <!-- LOGIN SCREEN -->
    <div id="login-screen">
      <h1>🔐 ПСИХОЛОГІЯ СИЛИ PRO</h1>
      <div class="login-container">
        <input id="email" placeholder="Email" type="email" />
        <input id="password" placeholder="Пароль" type="password" />
        <button id="loginBtn">Увійти</button>
        <button id="registerBtn">Реєстрація</button>
      </div>
      <p class="pro-badge">👑 PRO версія доступна</p>
    </div>

    <!-- MAIN MENU -->
    <div id="main-menu" style="display:none;">
      <h1>🧠 ПСИХОЛОГІЯ СИЛИ</h1>
      <div id="pro-status" class="pro-status"></div>
      
      <div class="menu-grid">
        <div class="menu-item" onclick="startSOS()">
          <div class="icon">🚨</div>
          <div>ЕКСТРЕНИЙ РЕЖИМ</div>
        </div>
        <div class="menu-item" onclick="openPolice()">
          <div class="icon">🚓</div>
          <div>ПІД ТИСКОМ</div>
        </div>
        <div class="menu-item" onclick="openIncidents()">
          <div class="icon">📂</div>
          <div>ІНЦИДЕНТИ</div>
        </div>
        <div class="menu-item pro-only" onclick="activatePro()">
          <div class="icon">👑</div>
          <div>ПРО АКТИВАЦІЯ</div>
        </div>
        <div class="menu-item pro-only" onclick="openProFeatures()">
          <div class="icon">⭐</div>
          <div>ПРО ФУНКЦІЇ</div>
        </div>
        <div class="menu-item" onclick="logout()">
          <div class="icon">🚪</div>
          <div>Вийти</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js?v=3.1.0">
  </script>

  <script>
    // 🚨 ВИДАЛЕННЯ SERVICE WORKER
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
        }
      });
    }

    // 🚨 ВИДАЛЕННЯ КАШУ ПРИ ЗАВАНТАЖЕННІ
    window.addEventListener('load', function() {
      if (navigator.clearAppData) {
        navigator.clearAppData();
      }
    });

    // 🚨 ПЕРЕВІРКА ЗВ'ЯЗКУ
    window.addEventListener('online', function() {
      showStatus("✅ Онлайн", 2000);
    });

    window.addEventListener('offline', function() {
      showStatus("❌ Офлайн", 2000);
    });
  </script>
</body>
</html>
